name: Deploy Data Pipeline Scripts to S3

on:
  push:
    branches:
      - main
    paths:
      - '**.py'
      - '.github/workflows/deploy.yml'

# Force the runner to use Node.js 24 for all JavaScript-based actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write   # Required for requesting the AWS JWT
  contents: read    # Required for actions/checkout

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Lint Code with Flake8
        run: |
          pip install flake8
          # Exclude the venv folder and hidden directories
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,.venv,.git,__pycache__
          # Do the same for the warning check
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=venv,.venv,.git,__pycache__

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::524843732866:role/GitHubActions-SteamS3-Role
          aws-region: us-east-1

      - name: Sync Scripts to S3 Bronze/Silver/Gold Repository
        run: |
          # Syncs only the python scripts, ignoring local configurations or virtual environments
          aws s3 sync . s3://steam-recommender-lake/scripts/ \
            --exclude "*" \
            --include "*.py" \
            --delete